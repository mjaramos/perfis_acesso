<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Perfis de Acesso</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; color: #333; }
        .header { background: #1a5276; color: #fff; padding: 1rem 2rem; display: flex; align-items: center; gap: 1rem; }
        .header h1 { font-size: 1.4rem; }
        .container { max-width: 1200px; margin: 1.5rem auto; padding: 0 1rem; }
        .tabs { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 1rem; }
        .tab { padding: 0.6rem 1.2rem; border: none; background: #d5dbdb; border-radius: 6px 6px 0 0; cursor: pointer; font-size: 0.95rem; }
        .tab.active { background: #1a5276; color: #fff; }
        .panel { display: none; background: #fff; border-radius: 0 8px 8px 8px; padding: 1.5rem; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
        .panel.active { display: block; }
        label { display: block; font-weight: 600; margin: 0.8rem 0 0.3rem; }
        select, input[type="text"] { width: 100%; padding: 0.5rem; border: 1px solid #ccc; border-radius: 4px; font-size: 0.95rem; }
        button { padding: 0.5rem 1.2rem; border: none; border-radius: 4px; cursor: pointer; font-size: 0.95rem; margin-top: 0.5rem; }
        .btn-primary { background: #1a5276; color: #fff; }
        .btn-danger { background: #c0392b; color: #fff; }
        .btn-success { background: #27ae60; color: #fff; }
        .result { margin-top: 1rem; padding: 1rem; background: #f8f9fa; border-radius: 6px; border-left: 4px solid #1a5276; }
        .result h3 { margin-bottom: 0.5rem; color: #1a5276; }
        .result ul { list-style: none; padding: 0; }
        .result li { padding: 0.3rem 0; padding-left: 1rem; position: relative; }
        .result li::before { content: "•"; position: absolute; left: 0; color: #1a5276; font-weight: bold; }
        .badge { display: inline-block; background: #1a5276; color: #fff; padding: 0.15rem 0.6rem; border-radius: 12px; font-size: 0.8rem; margin-left: 0.5rem; }
        .msg { padding: 0.7rem 1rem; border-radius: 4px; margin-top: 0.8rem; }
        .msg-ok { background: #d5f5e3; color: #1e8449; }
        .msg-err { background: #fadbd8; color: #922b21; }
        .section-title { font-size: 1.05rem; font-weight: 600; margin: 1rem 0 0.4rem; color: #1a5276; border-bottom: 1px solid #eee; padding-bottom: 0.3rem; }
        .func-item { display: flex; justify-content: space-between; align-items: center; padding: 0.4rem 0.6rem; border-bottom: 1px solid #f0f0f0; }
        .func-item:hover { background: #f8f9fa; }
        .func-item .btn-danger { padding: 0.2rem 0.6rem; font-size: 0.8rem; margin: 0; }
        .row { display: flex; gap: 1rem; }
        .row > * { flex: 1; }
        @media (max-width: 600px) { .row { flex-direction: column; } }
    </style>
</head>
<body>
    <div class="header">
        <h1>🔐 Sistema de Perfis de Acesso</h1>
    </div>
    <div class="container">
        <div class="tabs">
            <button class="tab active" onclick="showTab('consultar')">Consultar</button>
            <button class="tab" onclick="showTab('gerenciar-perfis')">Gerenciar Perfis</button>
            <button class="tab" onclick="showTab('gerenciar-func')">Gerenciar Funcionalidades</button>
            <button class="tab" onclick="showTab('gerenciar-abrang')">Gerenciar Abrangências</button>
        </div>

        <!-- CONSULTAR -->
        <div id="consultar" class="panel active">
            <h2>Consultar Funcionalidades</h2>
            <div class="row">
                <div>
                    <label for="c-perfil">Perfil</label>
                    <select id="c-perfil"></select>
                </div>
                <div>
                    <label for="c-abrang">Abrangência</label>
                    <select id="c-abrang"></select>
                </div>
            </div>
            <button class="btn-primary" onclick="consultar()">Consultar</button>
            <div id="c-result"></div>
        </div>

        <!-- GERENCIAR PERFIS -->
        <div id="gerenciar-perfis" class="panel">
            <h2>Gerenciar Perfis</h2>
            <label for="novo-perfil">Novo Perfil</label>
            <div class="row">
                <input type="text" id="novo-perfil" placeholder="Ex: PERFIL_NOVO">
                <button class="btn-success" onclick="addPerfil()" style="flex:0 0 auto">Adicionar</button>
            </div>
            <div id="perfis-msg"></div>
            <div class="section-title">Perfis Existentes</div>
            <div id="perfis-lista"></div>
        </div>

        <!-- GERENCIAR FUNCIONALIDADES -->
        <div id="gerenciar-func" class="panel">
            <h2>Gerenciar Funcionalidades</h2>
            <div class="row">
                <div>
                    <label for="f-perfil">Perfil</label>
                    <select id="f-perfil" onchange="loadFuncs()"></select>
                </div>
                <div>
                    <label for="f-abrang">Abrangência</label>
                    <select id="f-abrang" onchange="loadFuncs()"></select>
                </div>
            </div>
            <label for="f-nova">Nova Funcionalidade</label>
            <div class="row">
                <input type="text" id="f-nova" placeholder="Ex: Categoria → Subcategoria → Ação">
                <button class="btn-success" onclick="addFunc()" style="flex:0 0 auto">Adicionar</button>
            </div>
            <div id="func-msg"></div>
            <div class="section-title">Funcionalidades Atuais</div>
            <div id="func-lista"></div>
        </div>

        <!-- GERENCIAR ABRANGÊNCIAS -->
        <div id="gerenciar-abrang" class="panel">
            <h2>Gerenciar Abrangências</h2>
            <label for="nova-abrang">Nova Abrangência</label>
            <div class="row">
                <input type="text" id="nova-abrang" placeholder="Ex: regional">
                <button class="btn-success" onclick="addAbrang()" style="flex:0 0 auto">Adicionar</button>
            </div>
            <div id="abrang-msg"></div>
            <div class="section-title">Abrangências Existentes</div>
            <div id="abrang-lista"></div>
        </div>
    </div>

<script>
const API = '';

function showTab(id) {
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    event.target.classList.add('active');
}

async function api(url, opts) {
    const r = await fetch(API + url, opts);
    return r.json();
}

async function loadSelects() {
    const [perfis, abrangs] = await Promise.all([api('/api/perfis'), api('/api/abrangencias')]);
    ['c-perfil', 'f-perfil'].forEach(id => {
        const sel = document.getElementById(id);
        sel.innerHTML = perfis.map(p => `<option value="${p}">${p}</option>`).join('');
    });
    ['c-abrang'].forEach(id => {
        const sel = document.getElementById(id);
        sel.innerHTML = abrangs.map(a => `<option value="${a}">${a.charAt(0).toUpperCase()+a.slice(1)}</option>`).join('');
    });
    const fAbrang = document.getElementById('f-abrang');
    fAbrang.innerHTML = '<option value="gerais">Gerais</option>' + abrangs.map(a => `<option value="${a}">${a.charAt(0).toUpperCase()+a.slice(1)}</option>`).join('');
    loadPerfisLista(perfis);
    loadAbrangLista(abrangs);
}

function msg(elId, text, ok) {
    document.getElementById(elId).innerHTML = `<div class="msg ${ok ? 'msg-ok' : 'msg-err'}">${text}</div>`;
    setTimeout(() => document.getElementById(elId).innerHTML = '', 3000);
}

async function consultar() {
    const perfil = document.getElementById('c-perfil').value;
    const abrang = document.getElementById('c-abrang').value;
    const r = await api(`/api/consultar?perfil=${perfil}&abrangencia=${abrang}`);
    const el = document.getElementById('c-result');
    if (r.erro) { el.innerHTML = `<div class="msg msg-err">${r.erro}</div>`; return; }
    let html = `<div class="result">
        <h3>${r.perfil} — ${r.abrangencia} <span class="badge">${r.total_funcionalidades} funcionalidades</span></h3>
        <div class="section-title">Gerais (${r.funcionalidades_gerais.length})</div>
        <ul>${r.funcionalidades_gerais.map(f => `<li>${f}</li>`).join('')}</ul>`;
    if (r.funcionalidades_especificas.length) {
        html += `<div class="section-title">${r.abrangencia} (${r.funcionalidades_especificas.length})</div>
        <ul>${r.funcionalidades_especificas.map(f => `<li>${f}</li>`).join('')}</ul>`;
    } else {
        html += `<p style="margin-top:0.5rem;color:#888">Nenhuma funcionalidade específica para ${r.abrangencia}.</p>`;
    }
    el.innerHTML = html + '</div>';
}

async function addPerfil() {
    const nome = document.getElementById('novo-perfil').value.trim();
    if (!nome) return;
    const r = await api('/api/perfil', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({nome}) });
    msg('perfis-msg', r.sucesso || r.erro, !!r.sucesso);
    if (r.sucesso) { document.getElementById('novo-perfil').value = ''; loadSelects(); }
}

async function removePerfil(nome) {
    if (!confirm(`Remover perfil "${nome}"?`)) return;
    const r = await api('/api/perfil', { method: 'DELETE', headers: {'Content-Type':'application/json'}, body: JSON.stringify({nome}) });
    msg('perfis-msg', r.sucesso || r.erro, !!r.sucesso);
    if (r.sucesso) loadSelects();
}

function loadPerfisLista(perfis) {
    document.getElementById('perfis-lista').innerHTML = perfis.map(p =>
        `<div class="func-item"><span>${p}</span><button class="btn-danger" onclick="removePerfil('${p}')">Remover</button></div>`
    ).join('');
}

async function addAbrang() {
    const nome = document.getElementById('nova-abrang').value.trim();
    if (!nome) return;
    const r = await api('/api/abrangencia', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({nome}) });
    msg('abrang-msg', r.sucesso || r.erro, !!r.sucesso);
    if (r.sucesso) { document.getElementById('nova-abrang').value = ''; loadSelects(); }
}

function loadAbrangLista(abrangs) {
    document.getElementById('abrang-lista').innerHTML = abrangs.map(a =>
        `<div class="func-item"><span>${a.charAt(0).toUpperCase()+a.slice(1)}</span></div>`
    ).join('');
}

async function loadFuncs() {
    const perfil = document.getElementById('f-perfil').value;
    const abrang = document.getElementById('f-abrang').value;
    if (!perfil) return;
    const r = await api(`/api/consultar?perfil=${perfil}&abrangencia=${abrang === 'gerais' ? 'municipal' : abrang}`);
    if (r.erro) { document.getElementById('func-lista').innerHTML = ''; return; }
    const funcs = abrang === 'gerais' ? r.funcionalidades_gerais : r.funcionalidades_especificas;
    document.getElementById('func-lista').innerHTML = funcs.length
        ? funcs.map(f => `<div class="func-item"><span>${f}</span><button class="btn-danger" onclick="removeFunc('${perfil}','${abrang}',\`${f.replace(/`/g,'\\`')}\`)">Remover</button></div>`).join('')
        : '<p style="color:#888;padding:0.5rem">Nenhuma funcionalidade.</p>';
}

async function addFunc() {
    const perfil = document.getElementById('f-perfil').value;
    const abrang = document.getElementById('f-abrang').value;
    const func = document.getElementById('f-nova').value.trim();
    if (!func) return;
    const r = await api('/api/funcionalidade', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({perfil, abrangencia: abrang, funcionalidade: func}) });
    msg('func-msg', r.sucesso || r.erro, !!r.sucesso);
    if (r.sucesso) { document.getElementById('f-nova').value = ''; loadFuncs(); }
}

async function removeFunc(perfil, abrang, func) {
    if (!confirm('Remover esta funcionalidade?')) return;
    const r = await api('/api/funcionalidade', { method: 'DELETE', headers: {'Content-Type':'application/json'}, body: JSON.stringify({perfil, abrangencia: abrang, funcionalidade: func}) });
    msg('func-msg', r.sucesso || r.erro, !!r.sucesso);
    if (r.sucesso) loadFuncs();
}

loadSelects();
</script>
</body>
</html>
